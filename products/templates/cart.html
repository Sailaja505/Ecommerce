<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cart</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color:#f1f3f6;
    margin:0;
    padding:0;
}

.header{
    background-color:#212529;
    color:white;
    padding:18px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    letter-spacing:1px;
}

.container{
    width:80%;
    margin:30px auto;
}

.cart-item{
    background:white;
    padding:18px 22px;
    margin-bottom:18px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    transition:0.2s ease;
}

.cart-item:hover{
    transform:scale(1.01);
    box-shadow:0 4px 14px rgba(0,0,0,0.12);
}

.cart-item h3{
    margin:0 0 8px 0;
    color:#333;
}

.price{
    color:green;
    font-weight:bold;
}

.quantity{
    font-weight:bold;
    color:#444;
}

.actions{
    margin-top:10px;
}

.btn{
    display:inline-block;
    padding:6px 12px;
    margin-right:8px;
    border-radius:6px;
    text-decoration:none;
    font-size:14px;
    font-weight:bold;
}

.btn-remove{
    background:#dc3545;
    color:white;
}

.btn-remove:hover{ background:#b02a37; }

.btn-inc{
    background:#198754;
    color:white;
}

.btn-inc:hover{ background:#146c43; }

.btn-dec{
    background:#ffc107;
    color:black;
}

.btn-dec:hover{ background:#e0a800; }

.total-section{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    text-align:right;
    margin-top:25px;
}

.total-section h2{
    margin:0;
    color:#222;
}

.checkout-btn{
    display:inline-block;
    margin-top:12px;
    padding:10px 18px;
    background:#0d6efd;
    color:white;
    border-radius:8px;
    text-decoration:none;
    font-size:16px;
    font-weight:bold;
}

.checkout-btn:hover{
    background:#0b5ed7;
}
</style>

</head>
<body>

<div class="header">🛒 My Cart</div>

<div class="container">

{% for item in cart_items %}
<div class="cart-item">
    <h3>{{ item.product.name }}</h3>
    <p class="price">Price: ₹{{ item.product.price }}</p>
    <p class="quantity">Quantity: {{ item.quantity }}</p>

    <div class="actions">
        <a href="/remove/{{item.id}}/" class="btn btn-remove">Remove</a>
        <a href="/increase/{{item.id}}/" class="btn btn-inc">+</a>
        <a href="/decrease/{{item.id}}/" class="btn btn-dec">−</a>
    </div>
</div>
{% endfor %}

<div class="total-section">
    <h2>Total Price: ₹{{total_price}}</h2>
    <a href="/checkout/" class="checkout-btn">Proceed to Checkout</a>
</div>

</div>

</body>
</html>
