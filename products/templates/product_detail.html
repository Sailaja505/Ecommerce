<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ product.name }}</title>

<style>
body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background:#f2f4f7;
}

.container{
    width:70%;
    margin:60px auto;
}

.card{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 18px rgba(0,0,0,0.1);
}

.product-name{
    font-size:32px;
    margin-bottom:15px;
    color:#222;
}

.price{
    font-size:22px;
    color:green;
    font-weight:bold;
    margin-bottom:15px;
}

.description{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin-bottom:25px;
}

.btn{
    display:inline-block;
    padding:12px 20px;
    background:#198754;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:#157347;
    transform:translateY(-2px);
}

.back-link{
    display:inline-block;
    margin-top:18px;
    color:#0d6efd;
    text-decoration:none;
    font-weight:bold;
}

.back-link:hover{
    text-decoration:underline;
}
</style>

</head>
<body>

<div class="container">
    <div class="card">
        <h1 class="product-name">{{ product.name }}</h1>
        <div class="price">₹ {{ product.price }}</div>
        <div class="description">{{ product.description }}</div>

        <a href="/add-to-cart/{{product.id}}/" class="btn">🛒 Add to Cart</a>
        <br>
        <a href="/" class="back-link">← Continue Shopping</a>
    </div>
</div>

</body>
</html>
