<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background-color: #f5f5f5; }
.card { transition: 0.3s; }
.card:hover { transform: scale(1.03); box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
.price { color: green; font-weight: bold; font-size: 18px; }
</style>

</head>
<body>

<div class="container mt-4">

<h2 class="text-center mb-4">🛍 Our Products</h2>

<div class="row">

{% for product in products %}

<div class="col-md-3 mb-4">
<div class="card h-100 text-center p-2">

{% if product.image %}
<img src="{{ product.image.url }}" class="card-img-top" style="height:200px; object-fit:contain;">
{% else %}
<div style="height:200px; display:flex; align-items:center; justify-content:center;">
No Image
</div>
{% endif %}

<div class="card-body">
<h5 class="card-title">{{ product.name }}</h5>
<p class="price">₹ {{ product.price }}</p>

<a href="{% url 'product_detail' product.id %}" class="btn btn-primary btn-sm">View</a>
<a href="/add-to-cart/{{product.id}}/" class="btn btn-success btn-sm">Add to Cart</a>
</div>

</div>
</div>

{% endfor %}

</div>
</div>

</body>
</html>
